<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron Admin | Inbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .input-field { background: #111; border: 1px solid #222; color: #fff; width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; outline: none; }
        .btn { background: #fff; color: #000; font-weight: 800; padding: 15px; width: 100%; border-radius: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn { padding: 10px 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid transparent; cursor: pointer; opacity: 0.4; }
        .tab-btn.active { opacity: 1; border-color: #fff; }
        .chat-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        #admin-content { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="login-gate" class="max-w-xs mx-auto text-center mt-20">
        <h1 class="text-2xl font-black mb-8 uppercase italic">System Access</h1>
        <input type="password" id="pass" class="input-field text-center" placeholder="Password">
        <button onclick="checkPass()" class="btn">Login</button>
    </div>

    <div id="admin-content" class="max-w-2xl mx-auto">
        <div class="flex gap-6 mb-10">
            <div id="tab-updates" class="tab-btn active" onclick="switchTab('updates')">Updates</div>
            <div id="tab-inbox" class="tab-btn" onclick="switchTab('inbox')">Inbox</div>
            <button onclick="location.reload()" class="ml-auto text-[10px] opacity-30 uppercase">Logout</button>
        </div>

        <div id="view-updates">
            <div class="bg-zinc-900 p-6 rounded-2xl mb-8">
                <select id="cat" class="input-field"><option>Upcoming Release</option><option>Live Event</option></select>
                <input type="text" id="name" class="input-field" placeholder="Title">
                <input type="text" id="date" class="input-field" placeholder="Date">
                <button onclick="publish()" class="btn mt-2">Publish</button>
            </div>
            <div id="update-list" class="space-y-2"></div>
        </div>

        <div id="view-inbox" style="display:none;">
            <h2 class="text-xs font-bold uppercase mb-6 tracking-widest text-zinc-500">Recent Messages</h2>
            <div id="inbox-list"></div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";

        function checkPass() {
            if(document.getElementById('pass').value === "@Aaron123") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadUpdates(); loadInbox();
            }
        }

        function switchTab(tab) {
            document.getElementById('view-updates').style.display = tab === 'updates' ? 'block' : 'none';
            document.getElementById('view-inbox').style.display = tab === 'inbox' ? 'block' : 'none';
            document.getElementById('tab-updates').className = `tab-btn ${tab==='updates'?'active':''}`;
            document.getElementById('tab-inbox').className = `tab-btn ${tab==='inbox'?'active':''}`;
        }

        async function publish() {
            const data = { category: document.getElementById('cat').value, name: document.getElementById('name').value, date: document.getElementById('date').value };
            await fetch(`${BASE_URL}/updates.json`, { method: 'POST', body: JSON.stringify(data) });
            loadUpdates();
        }

        async function loadUpdates() {
            const res = await fetch(`${BASE_URL}/updates.json`);
            const data = await res.json();
            const list = document.getElementById('update-list');
            list.innerHTML = data ? Object.keys(data).reverse().map(k => `
                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-lg text-xs">
                    <span>${data[k].name}</span>
                    <button onclick="delUpdate('${k}')" class="text-red-500">Delete</button>
                </div>
            `).join('') : '';
        }

        async function delUpdate(k) { await fetch(`${BASE_URL}/updates/${k}.json`, { method: 'DELETE' }); loadUpdates(); }

        async function loadInbox() {
            const res = await fetch(`${BASE_URL}/chats.json`);
            const data = await res.json();
            const list = document.getElementById('inbox-list');
            if(!data) return;
            list.innerHTML = Object.keys(data).map(uid => {
                const msgs = Object.values(data[uid]);
                const lastMsg = msgs[msgs.length - 1];
                return `
                    <div class="chat-row">
                        <div class="text-[10px] text-zinc-500 mb-2">User ID: ${uid}</div>
                        <div class="text-sm mb-4 font-light italic text-zinc-300">"${lastMsg.text}"</div>
                        <div class="flex gap-2">
                            <input type="text" id="reply-${uid}" class="input-field mb-0 text-xs py-2" placeholder="Write reply...">
                            <button onclick="sendReply('${uid}')" class="bg-white text-black px-4 rounded-lg text-[10px] font-bold">Reply</button>
                            <button onclick="delChat('${uid}')" class="text-red-500 text-[10px] ml-auto">Clear</button>
                        </div>
                    </div>`;
            }).join('');
        }

        async function sendReply(uid) {
            const text = document.getElementById(`reply-${uid}`).value;
            if(!text) return;
            await fetch(`${BASE_URL}/chats/${uid}.json`, { 
                method: 'POST', 
                body: JSON.stringify({ sender: 'aaron', text: text, time: Date.now() }) 
            });
            document.getElementById(`reply-${uid}`).value = '';
            loadInbox();
        }

        async function delChat(uid) { if(confirm('Delete conversation?')) { await fetch(`${BASE_URL}/chats/${uid}.json`, { method: 'DELETE' }); loadInbox(); } }

        setInterval(() => { if(document.getElementById('admin-content').style.display === 'block') loadInbox(); }, 10000);
    </script>
</body>
</html>

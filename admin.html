<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Aaron</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Minimalist Input */
        .input-field { 
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            width: 100%; 
            padding: 12px; 
            border-radius: 4px; 
            outline: none; 
            font-weight: 300;
            letter-spacing: 1px;
            transition: all 0.4s;
        }
        .input-field:focus { border-color: rgba(255,255,255,0.4); }

        /* Professional Button */
        .btn { 
            background: #fff; 
            color: #000; 
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 700; 
            padding: 14px; 
            width: 100%; 
            border-radius: 4px; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; }
        
        /* Shades Effect Profile */
        .login-img { 
            width: 90px; height: 90px; border-radius: 50%; object-fit: cover; 
            margin: 0 auto 30px; border: 1px solid rgba(255,255,255,0.1); 
            filter: grayscale(1) brightness(0.5); 
        }

        .error-msg { color: #888; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: none; }
        
        /* Clean Checkbox Custom */
        .remember-wrap { 
            display: flex; align-items: center; justify-content: center; 
            gap: 12px; margin-bottom: 30px; cursor: pointer; opacity: 0.5;
            transition: 0.3s;
        }
        .remember-wrap:hover { opacity: 1; }
        .remember-wrap input { width: 14px; height: 14px; accent-color: #fff; cursor: pointer; }
        .remember-wrap label { cursor: pointer; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; font-weight: 300; }

        #admin-content { display: none; }
        .tab-btn { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; padding: 15px; transition: 0.3s; }
    </style>
</head>
<body class="p-6">

    <div id="login-gate" class="max-w-xs mx-auto text-center mt-32">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" class="login-img">
        <h1 class="text-xl font-thin mb-10 tracking-[0.5em] uppercase text-zinc-400">Admin</h1>
        
        <div id="error" class="error-msg">Auth Failed</div>
        
        <input type="password" id="pass" class="input-field text-center mb-4" placeholder="••••••••">
        
        <div class="remember-wrap" onclick="document.getElementById('remember').click()">
            <input type="checkbox" id="remember" onclick="event.stopPropagation()">
            <label for="remember">Keep session active</label>
        </div>

        <button onclick="checkPass()" class="btn">Login</button>
    </div>

    <div id="admin-content" class="max-w-xl mx-auto opacity-0 transition-opacity duration-1000">
        <div class="flex border-b border-white/5 mb-8">
            <div id="tab-u" class="tab-btn opacity-100 border-b border-white" onclick="switchTab('u')">Updates</div>
            <div id="tab-i" class="tab-btn opacity-30" onclick="switchTab('i')">Messages</div>
            <button onclick="logout()" class="ml-auto text-[9px] opacity-20 uppercase tracking-widest">Sign Out</button>
        </div>

        <div id="view-u">
            <div class="bg-zinc-950 border border-white/5 p-6 rounded mb-8">
                <select id="cat" class="input-field mb-4 text-[11px] uppercase tracking-wider">
                    <option>Upcoming Release</option>
                    <option>Live Event</option>
                </select>
                <input type="text" id="name" class="input-field mb-4" placeholder="RELEASE TITLE">
                <input type="text" id="date" class="input-field mb-4" placeholder="DATE (e.g. 2026)">
                <button onclick="publish()" class="btn">Update Feed</button>
            </div>
            <div id="update-list" class="space-y-2"></div>
        </div>

        <div id="view-i" style="display:none;">
            <div id="inbox-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="chat-modal" class="fixed inset-0 bg-black z-50 hidden flex-col p-6">
        <div class="flex justify-between items-center border-b border-white/5 pb-6">
            <span id="active-user-id" class="text-[9px] tracking-[4px] text-zinc-500 uppercase">Archive</span>
            <button onclick="closeChat()" class="text-[10px] tracking-widest uppercase opacity-50 hover:opacity-100">Close</button>
        </div>
        <div id="modal-history" class="flex-grow overflow-y-auto py-8 space-y-4"></div>
        <div class="pt-6 border-t border-white/5 flex gap-4">
            <input type="text" id="modal-reply" class="input-field mb-0 flex-grow" placeholder="WRITE RESPONSE...">
            <button onclick="sendReplyFromModal()" class="bg-white text-black px-8 rounded text-[10px] font-bold uppercase tracking-wider">Send</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";
        const ADMIN_PASS = "@Aaron123";
        let currentChatUser = null;

        // Persist session
        if (localStorage.getItem('admin_access') === 'granted') {
            document.addEventListener("DOMContentLoaded", showAdmin);
        }

        function checkPass() {
            const passInput = document.getElementById('pass');
            const isChecked = document.getElementById('remember').checked;

            if (passInput.value === ADMIN_PASS) {
                if (isChecked) localStorage.setItem('admin_access', 'granted');
                showAdmin();
            } else {
                document.getElementById('error').style.display = 'block';
                passInput.classList.add('animate-pulse');
                setTimeout(() => passInput.classList.remove('animate-pulse'), 500);
            }
        }

        function showAdmin() {
            document.getElementById('login-gate').style.display = 'none';
            const content = document.getElementById('admin-content');
            content.style.display = 'block';
            setTimeout(() => content.style.opacity = '1', 10);
            loadUpdates(); 
            loadInbox();
        }

        function logout() {
            localStorage.removeItem('admin_access');
            location.reload();
        }

        function switchTab(t) {
            document.getElementById('view-u').style.display = t === 'u' ? 'block' : 'none';
            document.getElementById('view-i').style.display = t === 'i' ? 'block' : 'none';
            document.getElementById('tab-u').style.opacity = t === 'u' ? '1' : '0.3';
            document.getElementById('tab-u').classList.toggle('border-b', t === 'u');
            document.getElementById('tab-i').style.opacity = t === 'i' ? '1' : '0.3';
            document.getElementById('tab-i').classList.toggle('border-b', t === 'i');
        }

        async function publish() {
            const data = { category: document.getElementById('cat').value, name: document.getElementById('name').value, date: document.getElementById('date').value };
            await fetch(`${BASE_URL}/updates.json`, { method: 'POST', body: JSON.stringify(data) });
            loadUpdates();
        }

        async function loadUpdates() {
            const res = await fetch(`${BASE_URL}/updates.json`);
            const data = await res.json();
            const list = document.getElementById('update-list');
            if(!data) return;
            list.innerHTML = Object.keys(data).reverse().map(k => `
                <div class="flex justify-between items-center p-5 bg-zinc-950 border border-white/5 rounded">
                    <span class="text-[10px] uppercase tracking-[2px] font-light text-zinc-300">${data[k].name}</span>
                    <button onclick="delUpdate('${k}')" class="text-[9px] opacity-30 hover:opacity-100 uppercase tracking-tighter">Remove</button>
                </div>
            `).join('');
        }

        async function delUpdate(k) { await fetch(`${BASE_URL}/updates/${k}.json`, { method: 'DELETE' }); loadUpdates(); }

        async function loadInbox() {
            const res = await fetch(`${BASE_URL}/chats.json`);
            const data = await res.json();
            const list = document.getElementById('inbox-list');
            if(!data) return list.innerHTML = "<p class='text-center opacity-20 text-[9px] mt-20 tracking-[4px]'>EMPTY ARCHIVE</p>";
            
            list.innerHTML = Object.keys(data).map(uid => {
                const msgs = Object.values(data[uid]);
                const lastMsg = msgs[msgs.length - 1];
                return `
                    <div class="bg-zinc-950 p-6 border border-white/5 rounded flex justify-between items-center cursor-pointer hover:border-white/20 transition" onclick="openChat('${uid}')">
                        <div class="w-2/3">
                            <div class="text-[8px] text-zinc-600 uppercase tracking-widest mb-2">${uid}</div>
                            <div class="text-[12px] font-light italic truncate opacity-60">"${lastMsg.text}"</div>
                        </div>
                        <button onclick="event.stopPropagation(); delChat('${uid}')" class="text-[8px] opacity-30 hover:opacity-100 uppercase tracking-[2px]">Delete</button>
                    </div>`;
            }).join('');
        }

        async function openChat(uid) {
            currentChatUser = uid;
            document.getElementById('active-user-id').textContent = uid;
            document.getElementById('chat-modal').classList.remove('hidden');
            document.getElementById('chat-modal').classList.add('flex');
            renderHistory();
        }

        async function renderHistory() {
            if(!currentChatUser) return;
            const res = await fetch(`${BASE_URL}/chats/${currentChatUser}.json`);
            const data = await res.json();
            const container = document.getElementById('modal-history');
            if(!data) return;
            container.innerHTML = Object.values(data).map(m => `
                <div class="${m.sender === 'aaron' ? 'ml-auto text-right' : 'mr-auto text-left'} max-w-[80%]">
                    <div class="text-[13px] font-light ${m.sender === 'aaron' ? 'bg-white text-black' : 'bg-zinc-900 text-white'} p-3 rounded px-5 inline-block">
                        ${m.text}
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendReplyFromModal() {
            const input = document.getElementById('modal-reply');
            if(!input.value.trim() || !currentChatUser) return;
            await fetch(`${BASE_URL}/chats/${currentChatUser}.json`, { 
                method: 'POST', 
                body: JSON.stringify({ sender: 'aaron', text: input.value, time: Date.now() }) 
            });
            input.value = '';
            renderHistory();
        }

        function closeChat() { document.getElementById('chat-modal').classList.add('hidden'); currentChatUser = null; }

        async function delChat(uid) {
            if(confirm("Confirm deletion?")) {
                await fetch(`${BASE_URL}/chats/${uid}.json`, { method: 'DELETE' });
                loadInbox();
            }
        }

        setInterval(() => {
            if(document.getElementById('admin-content').style.display === 'block') {
                loadInbox();
                if(currentChatUser) renderHistory();
            }
        }, 5000);
    </script>
</body>
</html>

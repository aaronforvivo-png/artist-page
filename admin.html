<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aaron Admin | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .input-field { background: #111; border: 1px solid #222; color: #fff; width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; outline: none; }
        .btn-primary { background: #fff; color: #000; font-weight: 800; padding: 12px; width: 100%; border-radius: 4px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        #admin-content { display: none; width: 100%; max-width: 400px; }
    </style>
</head>
<body class="p-6">
    <div id="login-gate" class="max-w-xs w-full text-center">
        <h1 class="text-xl font-black mb-6 uppercase tracking-widest text-white/50">Admin</h1>
        <input type="password" id="admin-pass" class="input-field text-center" placeholder="Password">
        <button onclick="checkPass()" class="btn-primary">Verify</button>
    </div>

    <div id="admin-content">
        <h1 class="text-2xl font-black mb-6 italic tracking-tighter text-center">DASHBOARD</h1>
        <div class="bg-zinc-900 p-6 rounded-lg border border-white/10">
            <select id="category" class="input-field">
                <option>Upcoming Release</option>
                <option>Live Event</option>
                <option>Announcement</option>
            </select>
            <input type="text" id="name" class="input-field" placeholder="Title">
            <input type="text" id="date" class="input-field" placeholder="Date (e.g. 12.25.24)">
            <button onclick="publish()" id="p-btn" class="btn-primary">Add Update</button>
        </div>
        <div id="list" class="mt-8 space-y-2"></div>
    </div>

    <script>
        // SIGURADUHIN NA TAMA ANG URL DITO
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";

        function checkPass() {
            if(document.getElementById('admin-pass').value === "@Aaron123") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadList();
            } else { alert("Wrong Password!"); }
        }

        async function publish() {
            const btn = document.getElementById('p-btn');
            const name = document.getElementById('name').value;
            const date = document.getElementById('date').value;
            const cat = document.getElementById('category').value;

            if(!name || !date) return alert("Paki-fill up!");

            btn.textContent = "Saving...";
            try {
                const res = await fetch(`${BASE_URL}/updates.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat, name: name, date: date })
                });
                if(res.ok) {
                    alert("Added successfully!");
                    document.getElementById('name').value = "";
                    document.getElementById('date').value = "";
                    loadList();
                }
            } catch (err) { alert("Error saving: " + err); }
            btn.textContent = "Add Update";
        }

        async function loadList() {
            const list = document.getElementById('list');
            try {
                const res = await fetch(`${BASE_URL}/updates.json`);
                const data = await res.json();
                list.innerHTML = "";
                if(!data) return;
                Object.keys(data).forEach(key => {
                    list.innerHTML += `
                        <div class="flex justify-between bg-white/5 p-3 rounded border border-white/5 text-xs mb-2">
                            <span>${data[key].name}</span>
                            <button onclick="deleteItem('${key}')" class="text-red-500 font-bold">Delete</button>
                        </div>`;
                });
            } catch (e) { console.log(e); }
        }

        async function deleteItem(key) {
            if(confirm("Delete this?")) {
                await fetch(`${BASE_URL}/updates/${key}.json`, { method: 'DELETE' });
                loadList();
            }
        }
    </script>
</body>
</html>

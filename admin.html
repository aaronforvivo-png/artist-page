<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .input-field { background: #111; border: 1px solid #222; color: #fff; width: 100%; padding: 15px; border-radius: 10px; outline: none; margin-bottom: 10px; }
        .btn { background: #fff; color: #000; font-weight: 800; padding: 15px; width: 100%; border-radius: 10px; text-transform: uppercase; }
        .tab-btn { padding: 15px; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; cursor: pointer; opacity: 0.3; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid #fff; }
        #admin-content { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="login-gate" class="max-w-xs mx-auto text-center mt-20">
        <h1 class="text-4xl font-black mb-10 italic">ADMIN</h1>
        <input type="password" id="pass" class="input-field text-center" placeholder="Password">
        <button onclick="checkPass()" class="btn">Authenticate</button>
    </div>

    <div id="admin-content" class="max-w-xl mx-auto">
        <div class="flex border-b border-white/5 mb-8">
            <div id="tab-u" class="tab-btn active" onclick="switchTab('u')">Updates</div>
            <div id="tab-i" class="tab-btn" onclick="switchTab('i')">Inbox</div>
            <button onclick="location.reload()" class="ml-auto text-[10px] opacity-20 uppercase">Exit</button>
        </div>

        <div id="view-u">
            <div class="bg-zinc-900 p-6 rounded-2xl mb-8">
                <select id="cat" class="input-field"><option>Upcoming Release</option><option>Live Event</option></select>
                <input type="text" id="name" class="input-field" placeholder="Title">
                <input type="text" id="date" class="input-field" placeholder="Date">
                <button onclick="publish()" class="btn mt-2">Publish</button>
            </div>
            <div id="update-list" class="space-y-3"></div>
        </div>

        <div id="view-i" style="display:none;">
            <div id="inbox-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";

        function checkPass() {
            if(document.getElementById('pass').value === "@Aaron123") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadUpdates(); loadInbox();
            }
        }

        function switchTab(t) {
            document.getElementById('view-u').style.display = t === 'u' ? 'block' : 'none';
            document.getElementById('view-i').style.display = t === 'i' ? 'block' : 'none';
            document.getElementById('tab-u').className = `tab-btn ${t==='u'?'active':''}`;
            document.getElementById('tab-i').className = `tab-btn ${t==='i'?'active':''}`;
        }

        async function publish() {
            const data = { category: document.getElementById('cat').value, name: document.getElementById('name').value, date: document.getElementById('date').value };
            await fetch(`${BASE_URL}/updates.json`, { method: 'POST', body: JSON.stringify(data) });
            loadUpdates();
        }

        async function loadUpdates() {
            const res = await fetch(`${BASE_URL}/updates.json`);
            const data = await res.json();
            const list = document.getElementById('update-list');
            list.innerHTML = data ? Object.keys(data).reverse().map(k => `
                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-xl text-xs">
                    <span class="font-bold">${data[k].name}</span>
                    <button onclick="delUpdate('${k}')" class="text-red-500 uppercase font-black">X</button>
                </div>
            `).join('') : '';
        }

        async function delUpdate(k) { await fetch(`${BASE_URL}/updates/${k}.json`, { method: 'DELETE' }); loadUpdates(); }

        async function loadInbox() {
            const res = await fetch(`${BASE_URL}/chats.json`);
            const data = await res.json();
            const list = document.getElementById('inbox-list');
            if(!data) return list.innerHTML = "No messages.";
            list.innerHTML = Object.keys(data).map(uid => {
                const msgs = Object.values(data[uid]);
                const lastMsg = msgs[msgs.length - 1];
                return `
                    <div class="bg-zinc-900 p-5 rounded-2xl border border-white/5">
                        <div class="text-[9px] text-zinc-500 mb-3 uppercase tracking-widest">Client: ${uid}</div>
                        <div class="text-sm italic mb-4">"${lastMsg.text}"</div>
                        <div class="flex gap-2">
                            <input type="text" id="rep-${uid}" class="input-field mb-0 py-2 text-xs" placeholder="Reply...">
                            <button onclick="sendReply('${uid}')" class="bg-white text-black px-5 rounded-xl text-[10px] font-bold uppercase">Send</button>
                        </div>
                    </div>`;
            }).join('');
        }

        async function sendReply(uid) {
            const text = document.getElementById(`rep-${uid}`).value;
            if(!text) return;
            await fetch(`${BASE_URL}/chats/${uid}.json`, { method: 'POST', body: JSON.stringify({ sender: 'aaron', text: text, time: Date.now() }) });
            document.getElementById(`rep-${uid}`).value = '';
            loadInbox();
        }

        setInterval(() => { if(document.getElementById('admin-content').style.display === 'block') loadInbox(); }, 8000);
    </script>
</body>
</html>

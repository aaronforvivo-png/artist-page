<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080808; --border: rgba(255, 255, 255, 0.1); }
        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .spotify-container {
            width: 100%; max-width: 700px; background: #000;
            border-radius: 4px; overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .minimal-btn {
            border: 1px solid var(--border); padding: 18px 0; font-size: 9px;
            letter-spacing: 0.5em; text-transform: uppercase; text-align: center;
            transition: all 0.5s ease; width: 100%; text-decoration: none; color: white;
        }
        .minimal-btn:hover { background: white; color: black; border-color: white; }
    </style>
</head>
<body class="px-6">

    <header class="w-full max-w-5xl py-14 flex justify-between items-center opacity-40">
        <span class="text-[9px] tracking-[0.8em] uppercase font-semibold">Aaron</span>
        <span class="text-[9px] tracking-[0.3em] uppercase">Archive 2026</span>
    </header>

    <main class="w-full max-w-2xl flex flex-col items-center mt-20 md:mt-32">
        <div class="text-center mb-24">
            <h1 class="text-6xl md:text-8xl font-thin tracking-tighter mb-4">Aaron</h1>
            <p class="text-[9px] tracking-[0.7em] opacity-30 uppercase">Alternative R&B / Soul</p>
        </div>

        <div class="spotify-container mb-20">
            <iframe 
                src="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd" 
                width="100%" 
                height="380" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-40">
            <a href="https://open.spotify.com/artist/5LpxW7YqZ67Vq5jW35ZJmK" target="_blank" class="minimal-btn">Spotify</a>
            <a href="#" class="minimal-btn">Instagram</a>
        </div>
    </main>

    <footer class="mt-auto w-full max-w-5xl py-12 border-t border-white/5 opacity-20">
        <p class="text-[8px] tracking-[0.5em] uppercase text-center md:text-left">© 2026 Aaron. Independent Artist.</p>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text-dim: rgba(255, 255, 255, 0.3); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Navigation */
        header { width: 100%; display: flex; justify-content: flex-end; padding: 30px; opacity: 0; animation: fadeIn 1s forwards 5s; }
        #menu-btn { cursor: pointer; padding: 10px; z-index: 1100; }
        .bar { width: 25px; height: 1px; background: #fff; margin: 6px 0; transition: 0.4s; }
        
        #sidebar { position: fixed; top: 0; right: -300px; width: 300px; height: 100%; background: #000; z-index: 1050; transition: 0.5s cubic-bezier(0.77, 0.2, 0.05, 1); display: flex; flex-direction: column; padding: 100px 40px; border-left: 1px solid var(--border); }
        #sidebar.open { right: 0; }
        #sidebar a { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; margin-bottom: 30px; transition: 0.3s; cursor: pointer; }
        #sidebar a:hover { color: #fff; transform: translateX(5px); }

        /* Slot Machine Intro */
        #intro-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.8s ease forwards 4.5s; }
        .slot-container { font-size: 8rem; font-weight: 800; display: flex; gap: 20px; overflow: hidden; height: 8rem; }
        .reel { animation: spin 0.15s linear infinite; display: flex; flex-direction: column; }
        .symbol { height: 8rem; width: 6rem; display: flex; align-items: center; justify-content: center; opacity: 0.1; }
        .reel-stop { animation: none !important; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .active-7 { opacity: 1 !important; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
        @keyframes spin { from { transform: translateY(0); } to { transform: translateY(-300%); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Main Content */
        .hero { text-align: center; opacity: 0; animation: fadeIn 1s forwards 4.8s; margin-top: 5vh; padding: 0 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 30px; border: 1px solid var(--border); filter: grayscale(100%) brightness(0.7); }
        
        /* SMOOTH GENRE STYLING */
        #genre-text { 
            display: inline-block; 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 1; 
            transform: translateY(0);
        }

        .btn-minimal { border: 1px solid var(--border); padding: 16px 40px; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: white; display: inline-block; margin-top: 40px; text-decoration: none; font-weight: 600; transition: 0.4s; }
        .btn-minimal:hover { background: white; color: black; border-color: white; }

        /* Updates Section */
        .updates-section { max-width: 450px; margin: 100px auto; padding: 0 20px; }
        .data-card { border-bottom: 1px solid var(--border); padding: 25px 0; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .data-card:hover { border-bottom-color: rgba(255,255,255,0.3); }

        /* Chat Widget */
        #chat-trigger { position: fixed; bottom: 30px; left: 30px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; opacity: 0; animation: fadeIn 1s forwards 6s; transition: 0.3s; }
        #chat-trigger:hover { transform: scale(1.1); }
        #chat-window { position: fixed; bottom: 90px; left: 30px; width: 320px; height: 450px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; font-size: 13px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 4px; max-width: 85%; line-height: 1.5; font-weight: 300; }
        .msg.fan { background: #fff; color: #000; align-self: flex-end; font-weight: 400; }
        .msg.aaron { background: #1a1a1a; color: #fff; align-self: flex-start; border: 1px solid var(--border); }
        .chat-input { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #050505; }
        .chat-input input { background: transparent; border: none; color: #fff; font-size: 12px; flex-grow: 1; outline: none; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="slot-container">
            <div class="reel" id="r1"><div class="symbol">3</div><div class="symbol">5</div><div class="symbol">7</div></div>
            <div class="reel" id="r2"><div class="symbol">1</div><div class="symbol">4</div><div class="symbol">7</div></div>
            <div class="reel" id="r3"><div class="symbol">2</div><div class="symbol">6</div><div class="symbol">7</div></div>
        </div>
    </div>

    <header>
        <div id="menu-btn" onclick="toggleSidebar()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </header>

    <aside id="sidebar">
        <a onclick="location.reload()">Home</a>
        <a onclick="comingSoon('Merch')">Merch</a>
        <a onclick="comingSoon('Videos')">Videos</a>
        <a onclick="comingSoon('Albums')">Albums</a>
    </aside>

    <main class="hero">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" class="profile-img">
        <h1 class="text-7xl font-thin tracking-tighter italic">Aaron</h1>
        
        <p class="text-[10px] tracking-[10px] text-zinc-500 uppercase mt-6 h-6 overflow-hidden">
            <span id="genre-text">R&B</span>
        </p>

        <a href="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd" target="_blank" class="btn-minimal">Listen on Spotify</a>

        <div class="updates-section">
            <h2 class="text-[8px] tracking-[6px] text-zinc-600 uppercase mb-10">— Archive & Updates —</h2>
            <div id="content"></div>
        </div>
    </main>

    <div id="chat-trigger" onclick="toggleChat()">
        <svg viewBox="0 0 24 24" width="18" fill="black"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <div id="chat-window">
        <div class="p-5 bg-[#0a0a0a] text-[9px] tracking-[4px] uppercase border-b border-white/5 font-bold text-zinc-500">Private Inbox</div>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="TYPE A MESSAGE..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="text-[10px] font-black uppercase tracking-widest text-white">Send</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";
        let userId = localStorage.getItem('chat_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_uid', userId);

        // Sidebar logic
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function comingSoon(item) { alert(`${item} - Coming Soon`); toggleSidebar(); }
        
        // Chat logic
        function toggleChat() { 
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
            if(win.style.display === 'flex') { loadMessages(); scrollBottom(); }
        }

        async function sendMsg() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            const msg = { sender: 'fan', text: input.value, time: Date.now() };
            await fetch(`${BASE_URL}/chats/${userId}.json`, { method: 'POST', body: JSON.stringify(msg) });
            input.value = '';
            loadMessages();
        }

        async function loadMessages() {
            const res = await fetch(`${BASE_URL}/chats/${userId}.json`);
            const data = await res.json();
            const box = document.getElementById('chat-messages');
            if(!data) return;
            box.innerHTML = Object.values(data).map(m => `<div class="msg ${m.sender}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function scrollBottom() { const box = document.getElementById('chat-messages'); box.scrollTop = box.scrollHeight; }

        // SMOOTH GENRE TRANSITION
        const genres = ["R&B", "Soul", "Pop"];
        let gIdx = 0;
        setInterval(() => {
            const el = document.getElementById("genre-text");
            if (el) {
                el.style.opacity = "0";
                el.style.transform = "translateY(-10px)";
                setTimeout(() => {
                    gIdx = (gIdx + 1) % genres.length;
                    el.textContent = genres[gIdx];
                    el.style.transform = "translateY(10px)";
                    setTimeout(() => {
                        el.style.opacity = "1";
                        el.style.transform = "translateY(0)";
                    }, 50);
                }, 800);
            }
        }, 4000);

        // Slot machine logic
        setTimeout(() => { 
            ['r1','r2','r3'].forEach((id, i) => {
                const el = document.getElementById(id);
                setTimeout(() => { 
                    el.classList.add('reel-stop'); 
                    el.style.transform="translateY(-200%)"; 
                    el.children[2].classList.add('active-7'); 
                }, 2000 + (i*500));
            });
        }, 100);

        // Load Updates
        async function loadUpdates() {
            const res = await fetch(`${BASE_URL}/updates.json`);
            const data = await res.json();
            const container = document.getElementById('content');
            if(!data) return container.innerHTML = "<p class='text-[8px] opacity-20 uppercase tracking-widest'>No records found</p>";
            container.innerHTML = Object.keys(data).reverse().map(key => `
                <div class="data-card text-left">
                    <div>
                        <p class="text-[7px] text-zinc-600 uppercase tracking-[3px] mb-1">${data[key].category}</p>
                        <p class="text-[11px] tracking-[2px] uppercase font-light text-zinc-200">${data[key].name}</p>
                    </div>
                    <p class="text-[9px] font-light opacity-30 tracking-widest">${data[key].date}</p>
                </div>
            `).join('');
        }

        loadUpdates();
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text-dim: rgba(255, 255, 255, 0.3); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #intro-overlay { position: fixed; inset: 0; background: #000; z-index: 900; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.8s ease forwards; animation-delay: 4.5s; }
        .slot-container { font-size: 8rem; font-weight: 800; display: flex; gap: 20px; overflow: hidden; height: 8rem; }
        .reel { animation: spin 0.15s linear infinite; display: flex; flex-direction: column; }
        .symbol { height: 8rem; width: 6rem; display: flex; align-items: center; justify-content: center; opacity: 0.2; }
        .reel-stop { animation: none !important; transition: transform 0.5s ease; }
        .active-7 { opacity: 1 !important; text-shadow: 0 0 20px #fff; }
        @keyframes spin { from { transform: translateY(0); } to { transform: translateY(-300%); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .hero { text-align: center; opacity: 0; animation: fadeInHero 1s forwards; animation-delay: 4.8s; margin-top: 15vh; width: 100%; max-width: 500px; padding: 0 20px; }
        @keyframes fadeInHero { to { opacity: 1; transform: translateY(-10px); } }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px; border: 1px solid var(--border); filter: grayscale(100%); }
        .btn-minimal { border: 1px solid var(--border); padding: 12px 30px; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: white; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn-minimal:hover { background: white; color: black; }
        .data-card { border-bottom: 1px solid var(--border); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div id="intro-overlay">
        <div class="slot-container">
            <div class="reel" id="r1"><div class="symbol">3</div><div class="symbol">5</div><div class="symbol">7</div></div>
            <div class="reel" id="r2"><div class="symbol">1</div><div class="symbol">4</div><div class="symbol">7</div></div>
            <div class="reel" id="r3"><div class="symbol">2</div><div class="symbol">6</div><div class="symbol">7</div></div>
        </div>
    </div>

    <main class="hero">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" class="profile-img">
        <h1 class="text-7xl font-thin tracking-tighter">Aaron</h1>
        <p class="text-[9px] tracking-[10px] text-zinc-500 uppercase mt-4">R&B / Soul</p>
        <a href="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd?si=4U3a3Jj0SEWvl3m16j_JRQ" target="_blank" class="btn-minimal">Listen</a>

        <div class="mt-20">
            <h2 class="text-[8px] tracking-[5px] text-zinc-600 uppercase mb-6">— Updates —</h2>
            <div id="content"><p class="text-[8px] opacity-20">Syncing...</p></div>
        </div>
    </main>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app/updates.json";

        async function load() {
            const container = document.getElementById('content');
            try {
                const res = await fetch(BASE_URL);
                const data = await res.json();
                if(!data) { container.innerHTML = "<p class='text-[8px] opacity-20'>TBA</p>"; return; }
                const html = Object.keys(data).reverse().map(key => `
                    <div class="data-card text-left">
                        <div>
                            <p class="text-[6px] text-zinc-500 uppercase">${data[key].category}</p>
                            <p class="text-[11px] tracking-widest uppercase">${data[key].name}</p>
                        </div>
                        <p class="text-[9px] font-mono opacity-40">${data[key].date}</p>
                    </div>
                `).join('');
                container.innerHTML = html;
            } catch(e) { container.innerHTML = "Error"; }
        }

        // Slot Machine Stop Logic
        setTimeout(() => { document.getElementById('r1').classList.add('reel-stop'); document.getElementById('r1').style.transform="translateY(-200%)"; document.getElementById('r1').children[2].classList.add('active-7'); }, 2000);
        setTimeout(() => { document.getElementById('r2').classList.add('reel-stop'); document.getElementById('r2').style.transform="translateY(-200%)"; document.getElementById('r2').children[2].classList.add('active-7'); }, 2500);
        setTimeout(() => { document.getElementById('r3').classList.add('reel-stop'); document.getElementById('r3').style.transform="translateY(-200%)"; document.getElementById('r3').children[2].classList.add('active-7'); }, 3000);

        load();
    </script>
</body>
</html>

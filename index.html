<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text-dim: rgba(255, 255, 255, 0.3); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Intro Animation */
        #intro-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.8s ease forwards; animation-delay: 4.5s; }
        .slot-container { font-size: 8rem; font-weight: 800; display: flex; gap: 20px; overflow: hidden; height: 8rem; }
        .reel { animation: spin 0.15s linear infinite; display: flex; flex-direction: column; }
        .symbol { height: 8rem; width: 6rem; display: flex; align-items: center; justify-content: center; opacity: 0.2; }
        .reel-stop { animation: none !important; transition: transform 0.5s ease; }
        .active-7 { opacity: 1 !important; text-shadow: 0 0 20px #fff; }
        @keyframes spin { from { transform: translateY(0); } to { transform: translateY(-300%); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; padding: 30px; display: flex; justify-content: center; gap: 40px; z-index: 100; opacity: 0; animation: fadeIn 1s forwards 5s; }
        nav a { text-transform: uppercase; font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-decoration: none; transition: 0.3s; cursor: pointer; }
        nav a:hover { color: #fff; }

        .hero { text-align: center; opacity: 0; animation: fadeIn 1s forwards 4.8s; margin-top: 20vh; padding: 0 20px; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .profile-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; margin: 0 auto 25px; border: 1px solid var(--border); filter: grayscale(100%); }
        .btn-minimal { border: 1px solid var(--border); padding: 15px 35px; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: white; display: inline-block; margin-top: 25px; transition: 0.3s; text-decoration: none; font-weight: 600; }
        .btn-minimal:hover { background: white; color: black; }

        /* Merch Modal */
        #merch-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

        /* Floating Chat */
        #chat-trigger { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 400; transition: 0.3s; opacity: 0; animation: fadeIn 1s forwards 6s; }
        #chat-trigger:hover { transform: scale(1.1); }
        #chat-trigger svg { width: 20px; fill: #000; }

        #chat-window { position: fixed; bottom: 100px; left: 30px; width: 300px; background: #111; border: 1px solid var(--border); border-radius: 15px; display: none; flex-direction: column; z-index: 400; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .chat-header { padding: 15px; background: #1a1a1a; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        #chat-messages { height: 250px; overflow-y: auto; padding: 15px; font-size: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .msg.fan { background: #222; align-self: flex-start; }
        .msg.aaron { background: #fff; color: #000; align-self: flex-end; font-weight: 600; }
        .chat-input { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { background: transparent; border: none; color: #fff; font-size: 12px; flex-grow: 1; outline: none; }

        .updates-section { max-width: 500px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .data-card { border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="slot-container">
            <div class="reel" id="r1"><div class="symbol">3</div><div class="symbol">5</div><div class="symbol">7</div></div>
            <div class="reel" id="r2"><div class="symbol">1</div><div class="symbol">4</div><div class="symbol">7</div></div>
            <div class="reel" id="r3"><div class="symbol">2</div><div class="symbol">6</div><div class="symbol">7</div></div>
        </div>
    </div>

    <nav>
        <a onclick="location.reload()">Home</a>
        <a onclick="toggleMerch(true)">Merch</a>
    </nav>

    <main class="hero">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" class="profile-img">
        <h1 class="text-7xl font-thin tracking-tighter">Aaron</h1>
        <p class="text-[10px] tracking-[8px] text-zinc-500 uppercase mt-4 h-4"><span id="genre-text">R&B</span></p>
        <a href="https://spotify.com" target="_blank" class="btn-minimal">Listen on Spotify</a>

        <div class="updates-section">
            <h2 class="text-[9px] tracking-[6px] text-zinc-600 uppercase mb-8">— Upcoming Updates —</h2>
            <div id="content"></div>
        </div>
    </main>

    <div id="merch-modal" onclick="toggleMerch(false)">
        <div class="text-center">
            <h2 class="text-5xl font-black italic tracking-tighter mb-2">MERCH</h2>
            <p class="text-[10px] tracking-[5px] text-zinc-500 uppercase">Coming Soon</p>
        </div>
    </div>

    <div id="chat-trigger" onclick="toggleChat()">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <div id="chat-window">
        <div class="chat-header">Direct Message</div>
        <div id="chat-messages">
            <div class="msg fan">Leave a message for Aaron...</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="Type here..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="text-[10px] font-bold uppercase">Send</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";
        let userId = localStorage.getItem('chat_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_uid', userId);

        function toggleMerch(show) { document.getElementById('merch-modal').style.display = show ? 'flex' : 'none'; }
        function toggleChat() { 
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
            if(win.style.display === 'flex') loadMessages();
        }

        async function sendMsg() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            const msg = { sender: 'fan', text: input.value, time: Date.now() };
            await fetch(`${BASE_URL}/chats/${userId}.json`, { method: 'POST', body: JSON.stringify(msg) });
            input.value = '';
            loadMessages();
        }

        async function loadMessages() {
            const res = await fetch(`${BASE_URL}/chats/${userId}.json`);
            const data = await res.json();
            const box = document.getElementById('chat-messages');
            if(!data) return;
            box.innerHTML = Object.values(data).map(m => `<div class="msg ${m.sender}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function loadUpdates() {
            const res = await fetch(`${BASE_URL}/updates.json`);
            const data = await res.json();
            const container = document.getElementById('content');
            if(!data) return container.innerHTML = "<p class='text-[8px] opacity-20'>TBA</p>";
            container.innerHTML = Object.keys(data).reverse().map(key => `
                <div class="data-card text-left">
                    <div>
                        <p class="text-[7px] text-zinc-500 uppercase tracking-widest">${data[key].category}</p>
                        <p class="text-[12px] tracking-widest uppercase font-light">${data[key].name}</p>
                    </div>
                    <p class="text-[10px] font-mono opacity-40">${data[key].date}</p>
                </div>
            `).join('');
        }

        const genres = ["R&B", "Soul", "Pop"];
        let gIdx = 0;
        setInterval(() => {
            const el = document.getElementById("genre-text");
            if(el) {
                el.style.opacity = 0;
                setTimeout(() => { gIdx = (gIdx + 1) % genres.length; el.textContent = genres[gIdx]; el.style.opacity = 1; }, 500);
            }
        }, 3000);

        setTimeout(() => { 
            ['r1','r2','r3'].forEach((id, i) => {
                const el = document.getElementById(id);
                setTimeout(() => { el.classList.add('reel-stop'); el.style.transform="translateY(-200%)"; el.children[2].classList.add('active-7'); }, 2000 + (i*500));
            });
        }, 100);

        loadUpdates();
        setInterval(loadMessages, 5000); 
    </script>
</body>
</html>

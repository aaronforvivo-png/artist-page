<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text-dim: rgba(255, 255, 255, 0.3); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        header { width: 100%; display: flex; justify-content: flex-end; padding: 30px; opacity: 0; animation: fadeIn 1s forwards 5s; position: relative; z-index: 1100; }
        #menu-btn { cursor: pointer; padding: 10px; transition: 0.3s; }
        .bar { width: 25px; height: 1px; background: #fff; margin: 6px 0; transition: 0.4s; }
        
        #menu-btn.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        #menu-btn.open .bar:nth-child(2) { opacity: 0; }
        #menu-btn.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        #sidebar { position: fixed; top: 0; right: -300px; width: 300px; height: 100%; background: #000; z-index: 1050; transition: 0.5s cubic-bezier(0.77, 0.2, 0.05, 1); display: flex; flex-direction: column; padding: 120px 40px; border-left: 1px solid var(--border); }
        #sidebar.open { right: 0; }
        #sidebar a { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; margin-bottom: 30px; transition: 0.3s; cursor: pointer; display: block; }
        #sidebar a:hover { color: #fff; transform: translateX(5px); }

        #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1040; display: none; opacity: 0; transition: 0.5s; }
        #menu-overlay.active { display: block; opacity: 1; }

        #intro-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.8s ease forwards; animation-delay: 4.5s; }
        .slot-container { font-size: 8rem; font-weight: 800; display: flex; gap: 20px; overflow: hidden; height: 8rem; }
        .reel { animation: spin 0.15s linear infinite; display: flex; flex-direction: column; }
        .symbol { height: 8rem; width: 6rem; display: flex; align-items: center; justify-content: center; opacity: 0.2; }
        .reel-stop { animation: none !important; transition: transform 0.5s ease; }
        .active-7 { opacity: 1 !important; text-shadow: 0 0 20px #fff; }
        @keyframes spin { from { transform: translateY(0); } to { transform: translateY(-300%); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .hero { text-align: center; opacity: 0; animation: fadeIn 1s forwards 4.8s; margin-top: 5vh; padding: 0 20px; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        h1.artist-name { font-family: 'Inter', sans-serif; font-weight: 100; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; margin: 0 auto 25px; border: 1px solid var(--border); filter: grayscale(100%); cursor: pointer; }

        .profile-container { position: relative; display: inline-block; }
        #stream-bubble { position: absolute; top: -35px; left: 50%; transform: translateX(-50%) translateY(10px); background: #fff; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        #stream-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 4px; border-style: solid; border-color: #fff transparent transparent transparent; }
        #stream-bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #genre-text { display: inline-block; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; transform: translateY(0); }
        .btn-minimal { border: 1px solid var(--border); padding: 15px 35px; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: white; display: inline-block; margin-top: 25px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .btn-minimal:hover { background: white; color: black; }

        .updates-section { max-width: 500px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .data-card { border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }

        #chat-trigger { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 400; opacity: 0; animation: fadeIn 1s forwards 6s; }
        #chat-window { position: fixed; bottom: 100px; left: 30px; width: 300px; background: #111; border: 1px solid var(--border); border-radius: 15px; display: none; flex-direction: column; z-index: 400; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #chat-messages { height: 250px; overflow-y: auto; padding: 15px; font-size: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; line-height: 1.4; }
        .msg.fan { background: #fff; color: #000; align-self: flex-end; font-weight: 500; border-bottom-right-radius: 2px; }
        .msg.aaron { background: #222; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { background: transparent; border: none; color: #fff; font-size: 12px; flex-grow: 1; outline: none; }
    </style>
</head>
<body>

    <div id="custom-alert" class="fixed top-10 left-1/2 -translate-x-1/2 z-[3000] hidden">
        <div class="bg-white text-black px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 border border-white/20">
            <span id="alert-msg" class="text-[10px] font-bold uppercase tracking-[3px]"></span>
        </div>
    </div>

    <div id="intro-overlay">
        <div class="slot-container">
            <div class="reel" id="r1"><div class="symbol">3</div><div class="symbol">5</div><div class="symbol">7</div></div>
            <div class="reel" id="r2"><div class="symbol">1</div><div class="symbol">4</div><div class="symbol">7</div></div>
            <div class="reel" id="r3"><div class="symbol">2</div><div class="symbol">6</div><div class="symbol">7</div></div>
        </div>
    </div>

    <div id="menu-overlay" onclick="toggleSidebar()"></div>

    <header>
        <div id="menu-btn" onclick="toggleSidebar()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </header>

    <aside id="sidebar">
        <a onclick="location.reload()">Home</a>
        <a onclick="comingSoon('Merch')">Merch</a>
        <a onclick="comingSoon('Videos')">Videos</a>
        <a onclick="comingSoon('Albums')">Albums</a>
    </aside>

    <main class="hero">
        <div class="profile-container">
            <div id="stream-bubble">Stream!!!</div>
            <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" class="profile-img" onclick="showStreamBubble()">
        </div>
        <h1 class="artist-name text-7xl tracking-tighter">Aaron</h1>
        <p class="text-[10px] tracking-[8px] text-zinc-500 uppercase mt-4 h-6 overflow-hidden"><span id="genre-text">R&B</span></p>
        <a href="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd" target="_blank" class="btn-minimal">Listen on Spotify</a>
        <div class="updates-section">
            <h2 class="text-[9px] tracking-[6px] text-zinc-600 uppercase mb-8">— Upcoming Updates —</h2>
            <div id="content"></div>
        </div>
    </main>

    <div id="chat-trigger" onclick="toggleChat()">
        <svg viewBox="0 0 24 24" width="20"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <div id="chat-window">
        <div class="p-4 bg-[#1a1a1a] text-[10px] tracking-widest uppercase border-b border-white/5">Inbox</div>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="text-[10px] font-bold uppercase">Send</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://aaron-site-41381-default-rtdb.asia-southeast1.firebasedatabase.app";
        let userId = localStorage.getItem('chat_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_uid', userId);

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('menu-overlay').classList.toggle('active');
            document.getElementById('menu-btn').classList.toggle('open');
        }

        // MINIMALIST TOAST ALERT
        function comingSoon(item) {
            const alertBox = document.getElementById('custom-alert');
            const msg = document.getElementById('alert-msg');
            msg.textContent = `${item} - Coming Soon`;
            alertBox.classList.remove('hidden');
            alertBox.style.opacity = "0";
            alertBox.style.transition = "opacity 0.5s ease";
            setTimeout(() => alertBox.style.opacity = "1", 10);
            setTimeout(() => {
                alertBox.style.opacity = "0";
                setTimeout(() => alertBox.classList.add('hidden'), 500);
            }, 3000);
            toggleSidebar();
        }

        async function trackVisit() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const visitData = { ip: ipData.ip, time: new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' }), timestamp: Date.now() };
                await fetch(`${BASE_URL}/visit_logs.json`, { method: 'POST', body: JSON.stringify(visitData) });
            } catch(e) {}
        }

        function showStreamBubble() { const b = document.getElementById('stream-bubble'); b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 3000); }
        function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; if(w.style.display === 'flex') loadMessages(); }
        async function sendMsg() { const i = document.getElementById('chat-in'); if(!i.value.trim()) return; await fetch(`${BASE_URL}/chats/${userId}.json`, { method: 'POST', body: JSON.stringify({ sender: 'fan', text: i.value, time: Date.now() }) }); i.value = ''; loadMessages(); }
        async function loadMessages() { const res = await fetch(`${BASE_URL}/chats/${userId}.json`); const data = await res.json(); const box = document.getElementById('chat-messages'); if(!data) return; box.innerHTML = Object.values(data).map(m => `<div class="msg ${m.sender}">${m.text}</div>`).join(''); box.scrollTop = box.scrollHeight; }
        async function loadUpdates() { const res = await fetch(`${BASE_URL}/updates.json`); const data = await res.json(); const container = document.getElementById('content'); if(!data) return container.innerHTML = "<p class='text-[8px] opacity-20 uppercase'>TBA</p>"; container.innerHTML = Object.keys(data).reverse().map(key => `<div class="data-card text-left"><div><p class="text-[7px] text-zinc-500 uppercase tracking-widest">${data[key].category}</p><p class="text-[12px] tracking-widest uppercase font-light">${data[key].name}</p></div><p class="text-[10px] font-mono opacity-40">${data[key].date}</p></div>`).join(''); }

        const genres = ["R&B", "Soul", "Pop"];
        let gIdx = 0;
        setInterval(() => {
            const el = document.getElementById("genre-text");
            if(el) {
                el.style.opacity = "0"; el.style.transform = "translateY(-10px)";
                setTimeout(() => { gIdx = (gIdx + 1) % genres.length; el.textContent = genres[gIdx]; el.style.transform = "translateY(10px)"; setTimeout(() => { el.style.opacity = "1"; el.style.transform = "translateY(0)"; }, 50); }, 800);
            }
        }, 4000);

        setTimeout(() => { 
            ['r1','r2','r3'].forEach((id, i) => { const el = document.getElementById(id); setTimeout(() => { el.classList.add('reel-stop'); el.style.transform="translateY(-200%)"; el.children[2].classList.add('active-7'); }, 2000 + (i*500)); });
            setTimeout(trackVisit, 2000);
        }, 100);

        loadUpdates(); setInterval(loadMessages, 5000);
    </script>
</body>
</html>

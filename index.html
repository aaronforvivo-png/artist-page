<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.3);
            --border: rgba(255, 255, 255, 0.1);
            --golden: #ffffff; /* Keeping it minimalist white/silver glow */
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.03; pointer-events: none; z-index: 100;
        }

        /* --- SLOT MACHINE INTRO --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 900;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOutIntro 0.8s ease-out forwards;
            animation-delay: 4.5s;
        }

        .slot-container {
            font-size: 8rem; font-weight: 800; line-height: 1;
            display: flex; gap: 20px; overflow: hidden; height: 8rem;
            letter-spacing: -0.05em;
        }

        .reel {
            display: flex; flex-direction: column;
            animation: spinReel 0.15s linear infinite;
        }

        .symbol {
            display: flex; align-items: center; justify-content: center;
            height: 8rem; width: 6rem; opacity: 0.2;
        }

        /* Final State Classes */
        .reel-stop { animation: none !important; transition: transform 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .active-7 { opacity: 1 !important; text-shadow: 0 0 30px rgba(255,255,255,0.8); }

        @keyframes spinReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-300%); }
        }

        @keyframes fadeOutIntro {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* --- MAIN CONTENT --- */
        .hero-container {
            text-align: center; opacity: 0;
            animation: fadeInHero 1.2s ease-out forwards;
            animation-delay: 4.8s; z-index: 10;
        }

        .profile-img {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 30px auto; border: 1px solid var(--border);
            filter: grayscale(100%); transition: all 0.8s ease;
        }

        .profile-img:hover { filter: grayscale(0%); border-color: white; }

        .btn-minimal {
            border: 1px solid var(--border); padding: 20px 60px; font-size: 10px;
            letter-spacing: 0.6em; text-transform: uppercase; text-decoration: none;
            color: white; transition: all 0.6s ease; display: inline-block; margin-top: 20px;
        }

        .btn-minimal:hover { background: white; color: black; transform: scale(1.05); }

        @keyframes fadeInHero {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-fixed {
            position: fixed; top: 40px; width: 100%; display: flex;
            justify-content: space-between; padding: 0 50px; opacity: 0;
            animation: fadeIn 1s ease-out forwards; animation-delay: 5.5s;
        }
        
        @keyframes fadeIn { to { opacity: 0.4; } }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="slot-container">
            <div class="reel" id="reel1">
                <div class="symbol">3</div><div class="symbol">5</div><div class="symbol">7</div><div class="symbol">9</div>
            </div>
            <div class="reel" id="reel2">
                <div class="symbol">1</div><div class="symbol">4</div><div class="symbol">7</div><div class="symbol">8</div>
            </div>
            <div class="reel" id="reel3">
                <div class="symbol">2</div><div class="symbol">6</div><div class="symbol">7</div><div class="symbol">0</div>
            </div>
        </div>
    </div>

    <nav class="nav-fixed hidden md:flex">
        <span class="text-[9px] tracking-[0.8em] uppercase font-semibold">Aaron</span>
        <span class="text-[9px] tracking-[0.4em] uppercase">Est. 2026</span>
    </nav>

    <main class="hero-container px-6">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" alt="Aaron" class="profile-img">
        <h1 class="text-7xl md:text-9xl font-thin tracking-tighter mb-2">Aaron</h1>
        <p class="text-[10px] tracking-[0.8em] text-dim uppercase mb-12">Alternative R&B</p>

        <a href="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd" target="_blank" class="btn-minimal">
            Listen on Spotify
        </a>
        
        <div class="mt-20 flex gap-12 justify-center opacity-20">
            <a href="#" class="text-[9px] tracking-widest uppercase hover:opacity-100 transition-opacity no-underline text-white">Instagram</a>
            <a href="#" class="text-[9px] tracking-widest uppercase hover:opacity-100 transition-opacity no-underline text-white">TikTok</a>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const reels = [
                { id: 'reel1', delay: 2000 },
                { id: 'reel2', delay: 2600 },
                { id: 'reel3', delay: 3200 }
            ];

            reels.forEach((reelData) => {
                setTimeout(() => {
                    const el = document.getElementById(reelData.id);
                    el.classList.add('reel-stop');
                    // Stop on the '7' symbol (which is at index 2 in our list)
                    el.style.transform = "translateY(-200%)";
                    // Highlight the 7
                    el.children[2].classList.add('active-7');
                }, reelData.delay);
            });
        });
    </script>
</body>
</html>

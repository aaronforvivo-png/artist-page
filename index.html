<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;600;800&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.3);
            --border: rgba(255, 255, 255, 0.1);
            --golden-highlight: #ffd700;
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            justify-content: center;
            overflow: hidden; /* Prevent scrolling during intro */
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.03; pointer-events: none; z-index: 100;
        }

        /* ---INTRO SPIN EFFECT--- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeOutIntro 0.8s ease-out forwards;
            animation-delay: 5s; /* total intro time */
        }

        .slot-container {
            font-family: 'Cherry Bomb One', cursive; /* A more thematic font for numbers */
            font-size: 8rem;
            line-height: 1;
            display: flex;
            gap: 15px;
            overflow: hidden;
            height: 10rem;
            color: var(--border); /* Dim initially */
        }

        .reel {
            display: flex;
            flex-direction: column;
            animation: spinReel 0.8s ease-in-out infinite;
        }

        .reel:nth-child(1) { animation-delay: 0s; }
        .reel:nth-child(2) { animation-delay: 0.1s; }
        .reel:nth-child(3) { animation-delay: 0.2s; }

        .symbol {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 10rem;
            width: 8rem;
        }

        .reel-final {
            animation: none !important;
            color: var(--golden-highlight);
            text-shadow: 0 0 20px var(--golden-highlight);
        }

        @keyframes spinReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-1000%); } /* Spin through symbols */
        }

        @keyframes fadeOutIntro {
            0% { opacity: 1; pointer-events: auto; }
            99% { opacity: 0; pointer-events: none; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* ---HERO CONTENT--- */
        .hero-container {
            text-align: center;
            animation: fadeInHero 1s ease-out forwards;
            animation-delay: 5.5s; /* Wait for intro */
            opacity: 0;
            z-index: 10;
        }

        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%; object-fit: cover;
            margin: 0 auto 30px auto;
            border: 1px solid var(--border);
            filter: grayscale(100%);
            transition: all 0.8s ease;
        }

        .profile-img:hover { filter: grayscale(0%); border-color: white; }

        .btn-minimal {
            border: 1px solid var(--border);
            padding: 20px 60px; font-size: 10px;
            letter-spacing: 0.6em; text-transform: uppercase;
            text-decoration: none; color: white;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: inline-block; margin-top: 20px;
        }

        .btn-minimal:hover { background: white; color: black; border-color: white; transform: scale(1.05); }

        @keyframes fadeInHero {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-fixed {
            position: fixed; top: 40px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 50px; opacity: 0.4;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 6s; opacity: 0;
        }
        
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="slot-container">
            <div class="reel" id="reel1">
                <div class="symbol">$</div> <div class="symbol">7</div> <div class="symbol">♥</div> <div class="symbol">7</div> <div class="symbol">BAR</div> <div class="symbol">X</div> <div class="symbol">7</div> <div class="symbol">♣</div> <div class="symbol">7</div> <div class="symbol">$</div>
            </div>
            <div class="reel" id="reel2">
                <div class="symbol">♥</div> <div class="symbol">X</div> <div class="symbol">7</div> <div class="symbol">7</div> <div class="symbol">$</div> <div class="symbol">7</div> <div class="symbol">BAR</div> <div class="symbol">7</div> <div class="symbol">♦</div> <div class="symbol">BAR</div>
            </div>
            <div class="reel" id="reel3">
                <div class="symbol">BAR</div> <div class="symbol">X</div> <div class="symbol">♠</div> <div class="symbol">7</div> <div class="symbol">7</div> <div class="symbol">BAR</div> <div class="symbol">♣</div> <div class="symbol">7</div> <div class="symbol">$</div> <div class="symbol">7</div>
            </div>
        </div>
        <p class="text-[10px] tracking-[0.8em] text-white opacity-20 uppercase mt-10">Hold on...</p>
    </div>

    <nav class="nav-fixed hidden md:flex">
        <span class="text-[9px] tracking-[0.8em] uppercase font-semibold">Aaron</span>
        <span class="text-[9px] tracking-[0.4em] uppercase">Est. 2026</span>
    </nav>

    <main class="hero-container px-6">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" alt="Aaron" class="profile-img">

        <h1 class="text-7xl md:text-9xl font-thin tracking-tighter mb-2">Aaron</h1>
        <p class="text-[10px] tracking-[0.8em] text-dim uppercase mb-12">Alternative R&B</p>

        <a href="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd" target="_blank" class="btn-minimal">
            Listen on Spotify
        </a>
        
        <div class="mt-20 flex gap-12 justify-center opacity-20">
            <a href="#" class="text-[9px] tracking-widest uppercase hover:opacity-100 transition-opacity no-underline text-white">Instagram</a>
            <a href="#" class="text-[9px] tracking-widest uppercase hover:opacity-100 transition-opacity no-underline text-white">TikTok</a>
        </div>
    </main>

    <footer class="fixed bottom-10 w-full text-center opacity-10 hidden md:block">
        <p class="text-[8px] tracking-[0.5em] uppercase">© 2026 Aaron. Independent Artist.</p>
    </footer>

    <script>
        // Use a simple timer to simulate the spin stopping
        document.addEventListener("DOMContentLoaded", () => {
            // First stop reel 1
            setTimeout(() => {
                document.getElementById('reel1').classList.add('reel-final');
                // Center the final symbol manually to match centering of symbols
                document.getElementById('reel1').style.transform = "translateY(-100%)";
            }, 3000); // 3 seconds of full spin
            
            // Then reel 2
            setTimeout(() => {
                document.getElementById('reel2').classList.add('reel-final');
                 // Symbols are ordered such that symbol indices match their position
                document.getElementById('reel2').style.transform = "translateY(-300%)";
            }, 3600); // 3.6 seconds

            // Finally reel 3
            setTimeout(() => {
                document.getElementById('reel3').classList.add('reel-final');
                document.getElementById('reel3').style.transform = "translateY(-300%)";
            }, 4200); // 4.2 seconds

            // Fade in navigation
            setTimeout(() => {
                const nav = document.querySelector('.nav-fixed');
                nav.style.opacity = '0.4'; 
            }, 5500); 
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.3);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        /* Ambient grain effect para sa R&B texture */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.03; pointer-events: none; z-index: 100;
        }

        .hero-container {
            text-align: center;
            animation: fadeIn 2.5s ease-out forwards;
            z-index: 10;
        }

        /* Artist Image Styling */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 30px auto;
            border: 1px solid var(--border);
            filter: grayscale(100%); /* Para sa professional monochrome look */
            transition: all 0.8s ease;
        }

        .profile-img:hover {
            filter: grayscale(0%);
            border-color: white;
        }

        .btn-minimal {
            border: 1px solid var(--border);
            padding: 20px 60px;
            font-size: 10px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: inline-block;
            margin-top: 20px;
        }

        .btn-minimal:hover {
            background: white;
            color: black;
            border-color: white;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-fixed {
            position: fixed;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <nav class="nav-fixed hidden md:flex">
        <span class="text-[9px] tracking-[0.8em] uppercase font-semibold">Aaron</span>
        <span class="text-[9px] tracking-[0.4em] uppercase">Est. 2026</span>
    </nav>

    <main class="hero-container px-6">
        <img src="https://i.scdn.co/image/ab6761610000f178c0d0bd36902abe115eea23ab" alt="Aaron" class="profile-img">

        <h1 class="text-7xl md:text-9xl font-thin tracking-tighter mb-2">Aaron</h1>
        <p class="text-[10px] tracking-[0.8em] text-dim uppercase mb-12">Alternative R&B</p>

        <a href="https://open.spotify.com/artist/39hKl1L86QdZQgXl0qEBWd" target="_blank" class="btn-minimal">
            Listen on Spotify
        </a>
        
        <div class="mt-20 flex gap-12 justify-center opacity-20">
            <a href="#" class="text-[9px] tracking-widest uppercase hover:opacity-100 transition-opacity no-underline text-white">Instagram</a>
            <a href="#" class="text-[9px] tracking-widest uppercase hover:opacity-100 transition-opacity no-underline text-white">TikTok</a>
        </div>
    </main>

    <footer class="fixed bottom-10 w-full text-center opacity-10">
        <p class="text-[8px] tracking-[0.5em] uppercase">© 2026 Aaron. Independent Artist.</p>
    </footer>

</body>
</html>

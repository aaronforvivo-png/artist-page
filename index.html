<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0a0a; 
            --text: #ffffff;
            --accent: #333333;
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Subtle minimalist texture */
        .grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.03; pointer-events: none; z-index: 50;
        }

        .spotify-container {
            width: 100%;
            max-width: 700px;
            background: #121212;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            transition: color 0.3s ease;
        }

        .nav-link:hover { color: white; }

        .btn-outline {
            border: 1px solid var(--accent);
            padding: 14px 0;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-outline:hover {
            border-color: white;
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <header class="w-full max-w-5xl py-12 px-8 flex justify-between items-center">
        <h1 class="text-sm font-semibold tracking-[0.8em] uppercase">Aaron</h1>
        <div class="hidden md:block h-[1px] w-24 bg-white/10"></div>
    </header>

    <main class="w-full max-w-3xl px-8 flex flex-col items-center mt-12 md:mt-20">
        
        <div class="mb-20 text-center">
            <h2 class="text-5xl md:text-7xl font-extralight tracking-tighter mb-4">Aaron</h2>
            <p class="text-[10px] tracking-[0.6em] opacity-30 uppercase">Alternative R&B / Soul</p>
        </div>

        <div class="spotify-container mb-16">
            <iframe 
                src="https://open.spotify.com/embed/artist/5Lp5R9mK9RjH7K5yG9Tf6a?utm_source=generator&theme=0" 
                width="100%" 
                height="450" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-32">
            <a href="https://open.spotify.com/artist/5Lp5R9mK9RjH7K5yG9Tf6a" target="_blank" class="btn-outline">Spotify</a>
            <a href="#" class="btn-outline">Instagram</a>
        </div>

    </main>

    <footer class="mt-auto w-full max-w-5xl py-12 px-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
        <p class="text-[8px] tracking-[0.4em] opacity-20 uppercase">© 2026 Aaron. Independent Artist.</p>
        <div class="flex gap-8">
            <a href="#" class="nav-link">Youtube</a>
            <a href="#" class="nav-link">TikTok</a>
        </div>
    </footer>

</body>
</html>
